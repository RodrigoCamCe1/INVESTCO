services:
  postgres:
    image: postgres:16-alpine
    container_name: investco-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: investco
    ports:
      - "5433:5432"
    volumes:
      - investco_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d investco"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  investco_pgdata:
